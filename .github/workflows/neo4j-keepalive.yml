name: Neo4j Keep Alive
on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Neo4j
        run: |
          pip install neo4j --quiet
          python -c "
          from neo4j import GraphDatabase
          d = GraphDatabase.driver('${{ secrets.NEO4J_URI }}', auth=('${{ secrets.NEO4J_USERNAME }}', '${{ secrets.NEO4J_PASSWORD }}'))
          with d.session() as s:
              s.run('RETURN 1')
          print('Neo4j alive')
          d.close()
          "
